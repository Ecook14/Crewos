name: Build CrewOS Lite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-lite:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Build Script (Lite)
      run: |
        chmod +x scripts/build_lite.sh
        ./scripts/build_lite.sh

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: crewos-lite-rootfs
        path: build/crewos-lite-rootfs.tar.gz
