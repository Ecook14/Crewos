# CrewOS Elite Kernel Tuning
# Optimized for: Low Latency, High Throughput, Minimal Memory Pressure

# --- 1. Memory Management ---
# Reduce swappiness (we prefer keeping data in RAM)
vm.swappiness = 10
# Increase cache pressure (keep inode/dentry caches lean)
vm.vfs_cache_pressure = 150
# OOM Killer: Panic on out-of-memory instead of just killing random tasks
# (Optional: set to 1 for high-availability nodes)
vm.panic_on_oom = 0

# --- 2. Network Stack (Elite Routing) ---
# Disable slow start after idle (keep pipes full)
net.ipv4.tcp_slow_start_after_idle = 0
# Enable MTU probing (smart packet sizing)
net.ipv4.tcp_mtu_probing = 1
# Enable BBR Congestion Control (Google's optimized algorithm)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr
# Enable TCP Fast Open (reduce handshake latency)
net.ipv4.tcp_fastopen = 3
# Increase max connections & buffer sizes
net.core.somaxconn = 8192
net.ipv4.tcp_max_syn_backlog = 8192
net.core.netdev_max_backlog = 5000
net.core.optmem_max = 65536
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.ipv4.udp_rmem_min = 8192
net.ipv4.udp_wmem_min = 8192

# --- 3. CPU Scheduler ---
# Reduce migration cost (improve cache locality)
kernel.sched_migration_cost_ns = 5000000
# Wakeup granularity (lower = snappier interactivity for agents)
kernel.sched_wakeup_granularity_ns = 2000000

# --- 4. File System ---
# Increase max open files
fs.file-max = 2097152
